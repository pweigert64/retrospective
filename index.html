<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpine Retrospektive</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Noto+Color+Emoji&display=swap" rel="stylesheet">
	
	<link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
	<link rel="apple-touch-icon" href="favicon.png">
	<link rel="shortcut icon" href="favicon.png">
	<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="main-layout">
	<aside id="sidebar">
	    <div class="flex items-center justify-between p-5 border-b md:block">
			<div class="flex items-center gap-2">
            	<img src="favicon.png" alt="favIcon" class="w-6 h-6 inline-block">
            	<span class="font-light text-[9px] tracking-tighter text-slate-400">v0.50</span>
        	</div>
			<button onclick="toggleSidebar()" class="md:hidden text-xl">✕</button>
	    </div>
	    <div id="sidebar-years"></div>
	</aside>
	<div id="sidebar-overlay" onclick="toggleSidebar()" class="hidden fixed inset-0 bg-black/30 z-[14000]"></div>
	
    <div id="content-area" class="flex-1 flex flex-col h-screen overflow-hidden">
        <header id="top-nav" class="flex items-center justify-between px-4 h-[60px] border-b shrink-0 gap-2">
		 	 <button onclick="toggleSidebar()" class="md:hidden mr-2 text-2xl" title="Menu">☰</button>
			 <button onclick="toggleTxtSearch()" class="flex items-center shrink-0 gap-2 hover:bg-slate-100 p-1 rounded-lg transition-colors">
				<span class="text-lg">🔍</span>
				<div id="current-year-label" class="font-bold text-slate-500 tracking-normal italic"></div>
			 </button>

			 <div class="flex items-center gap-1 overflow-x-auto no-scrollbar ml-auto min-w-0" id="header-filter-bar">
				<button class="filter-button filter-button-active" data-activity="ski">❄️</button>
				<button class="filter-button filter-button-active" data-activity="piste">🚠</button>
				<button class="filter-button filter-button-active" data-activity="hike">🥾</button>
				<button class="filter-button filter-button-active" data-activity="climb">⛰️</button>
				<button class="filter-button filter-button-active" data-activity="rope">🧗</button>
				<button class="filter-button filter-button-active" data-activity="bike">🚴</button>
				<button class="filter-button filter-button-active" data-activity="bike+hike">🚵</button>
				<button class="filter-button filter-button-active" data-activity="trip">🏛️</button>
			 </div>
             <div class="flex gap-2 bg-gray-100 p-1 rounded-xl">
                <button onclick="switchView('portal')" id="nav-portal" class="px-2 py-2 rounded-lg bg-white shadow-sm text-2xl">🗓️</button>
                <button onclick="switchView('map',true)" id="nav-map" class="px-2 py-2 rounded-lg opacity-50 text-2xl">🗺️</button>
             </div>
        </header>

		<div id="txtSearchToolbar" class="hidden bg-white border-b px-4 py-2 flex items-center gap-3 shadow-sm z-[1001]">
			<input type="search" id="txtSearchInput" 
				placeholder="search..." 
				class="flex-1 p-2 bg-gray-100 rounded-lg outline-none focus:ring-1 focus:ring-slate-300"
				onkeydown="if(event.key==='Enter') handleSearch(this.value, true)"
				oninput="handleTxtSearch(this.value)">
			<button class="go-btn" onclick="handleTxtSearch(document.getElementById('txtSearchInput').value,true)" class="text-slate-400 text-sm">GO</button>
		</div>
		<main class="flex-1 overflow-hidden relative">
			<section id="portal-view">
				<div id="portal-grid" 
					class="grid gap-4 w-full max-w-[2400px] mx-auto" 
					style="grid-template-columns: repeat(auto-fill, minmax(450px, 1fr));">
				</div>
			</section>

			<section id="map-view">
				<div id="map-container">
					<div id="map"></div> <div id="map-settings-group" class="floating-container" style="top: 15px; right: 15px;">
						<button class="circle-toggle" onclick="togglePanel('map-panel')">🗺️</button>
						<div id="map-panel" class="pop-out-panel">
							<div class="bg-indigo-50 p-3 rounded-lg flex flex-col gap-2 text-[10px] font-bold">
								<div class="flex justify-between border-b border-indigo-200 pb-1 text-indigo-600">
									<span class="uppercase">Zoom</span>
									<span id="zoom-level-display">11</span>
								</div>
								<div class="flex justify-between">
									<span>SWITCH AT:</span>
									<span id="threshold-display">16</span>
								</div>
								<input type="range" id="threshold-slider" min="1" max="17" value="16" step="1" class="w-full">
							</div>
							<div class="grid grid-cols-2 gap-2 mt-1">
								<button id="hike-layer-btn" class="filter-button bg-white text-[9px] py-2">🥾 HIKE</button>
								<button id="bike-layer-btn" class="filter-button bg-white text-[9px] py-2">🚲 MTB</button>
							</div>
						</div>
					</div>

					<div id="activity-settings-group" class="floating-container" style="bottom: 20px; right: 15px;">
						<div id="activity-panel" class="pop-out-panel">
							<!-- removed year selector -->
							<!-- removed activity filters -->
							<div class="pt-1 border-t">
								<div class="text-[10px] font-bold text-gray-400 uppercase mb-1">Track Control:</div>
								<div class="grid grid-cols-2 gap-1.5">
									<button class="filter-button bg-emerald-600 text-white border-none" onclick="showAllTracks()">🗺️ ALL</button>
									<button id="clear-tracks-btn" class="filter-button bg-gray-300 text-white border-none" onclick="clearAllTracks()">🗑️ CLR</button>
								</div>
							</div>
							<div class="mt-2 text-[9px] border-t pt-2">
								<button onclick="reloadData()" class="flex justify-between w-full uppercase">
									<span>🔄 Refresh Data</span>
									<span id="reload-status">IDLE</span>
								</button>
							</div>
						</div>
						<button class="circle-toggle" onclick="togglePanel('activity-panel')">⚙️</button>
					</div>
				</div>
			</section>
		</main>
    </div>
</div>

<script src="app.js" defer></script>
</body>

</html>
